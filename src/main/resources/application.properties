spring.application.name=Web01

# DBeaver "ORCLPDB1 springuser" \uC5F0\uACB0 \uC124\uC815
spring.datasource.url=jdbc:oracle:thin:@//100.100.109.24:1521/ORCLPDB1
spring.datasource.username=springuser
# spring.datasource.password \uB294 secret\uC5D0\uC11C \uAD00\uB9AC

# Flyway \uC124\uC815 (\uCC98\uC74C\uC5D4 true\uB85C \uC2DC\uC791)
spring.flyway.enabled=true
# \uAE30\uC874 DB\uC5D0 Flyway\uB97C \uCC98\uC74C \uC801\uC6A9\uD560 \uB54C \uAE30\uC900 \uBC84\uC804\uC744 \uC124\uC815\uD558\uB294 baseline \uC635\uC158
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=9
spring.flyway.validate-migration-naming=true

# \uD30C\uC77C \uC5C5\uB85C\uB4DC \uD06C\uAE30 \uC81C\uD55C (\uB3D9\uC601\uC0C1 \uC5C5\uB85C\uB4DC \uACE0\uB824\uD574\uC11C \uC124\uC815)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# \uC5C5\uB85C\uB4DC \uACBD\uB85C (docker-compose \uD658\uACBD\uBCC0\uC218\uB85C \uC624\uBC84\uB77C\uC774\uB4DC \uAC00\uB2A5)
app.upload.path=/app/uploads
app.upload.url-prefix=/uploads

# Hibernate \uCFFC\uB9AC \uB85C\uADF8 \uCD9C\uB825 # true \uB610\uB294 false
spring.jpa.show-sql=false
# open-in-view \uBE44\uD65C\uC131\uD654 (\uC131\uB2A5\uC0C1 false \uAD8C\uC7A5)
spring.jpa.open-in-view=false
# OracleDialect \uC790\uB3D9 \uAC10\uC9C0 \uBE44\uD65C\uC131\uD654 \uC635\uC158
spring.jpa.properties.hibernate.dialect=

# JPA ddl-auto\uB97C validate\uB85C \uC124\uC815 (Flyway\uAC00 DDL \uAD00\uB9AC)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# \uBD88\uD544\uC694\uD55C devtools \uB85C\uADF8 \uC228\uAE40
logging.level.org.springframework.boot.devtools.restart.ChangeableUrls=WARN

# \uC11C\uBC84 \uC7AC\uC2DC\uC791 \uC2DC \uC138\uC158 \uBCF5\uC6D0 \uC548 \uD568
server.servlet.session.persistent=false

# Nginx \uB9AC\uBC84\uC2A4 \uD504\uB85D\uC2DC \uD5E4\uB354 \uC804\uB2EC \uC124\uC815 (HTTPS \uC801\uC6A9\uC2DC \uD544\uC694\uD55C \uC124\uC815)
server.forward-headers-strategy=framework

# \uC11C\uBC84 \uD3EC\uD2B8 \uAE30\uBCF8\uAC12 8080\uC73C\uB85C \uC124\uC815
server.port=8080
# \uCD94\uD6C4 ssl \uC801\uC6A9 \uC2DC \uC544\uB798 \uC8FC\uC11D \uD574\uC81C (NAS Spring\uBC30\uD3EC\uC2DC)
#server.port=8443
#server.ssl.key-store=classpath:keystore.p12
#server.ssl.key-store-password=changeit
#server.ssl.key-store-type=PKCS12
#server.ssl.key-alias=springboot

# Gmail \uC571 \uBE44\uBC00\uBC88\uD638 \uBC1C\uAE09: Google \uACC4\uC815 \u2192 \uBCF4\uC548 \u2192 2\uB2E8\uACC4 \uC778\uC99D \uD65C\uC131\uD654 \uD6C4 \uBC1C\uAE09
# Gmail \uC124\uC815 (\uAD6C\uAE00 SMTP\uB97C \uD1B5\uD55C \uBC1C\uC1A1)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=royalkjungho@gmail.com
# Gmail \uC571 \uBE44\uBC00\uBC88\uD638 # \uC77C\uBC18 \uACC4\uC815 \uBE44\uBC00\uBC88\uD638 X, \uC571 \uBE44\uBC00\uBC88\uD638 O
# spring.mail.password \uB294 secret\uC5D0\uC11C \uAD00\uB9AC
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# \uC2DC\uD06C\uB9BF \uD30C\uC77C import (\uC5C6\uC5B4\uB3C4 \uAD6C\uB3D9 \uAC00\uB2A5 \u2192 optional)
# \u2500\u2500 \uD018\uC774\uC0AC\uC874 \uC790\uB3D9 \uC218\uC9D1 \uC124\uC815 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# enabled=true \uB85C \uBC14\uAFB8\uBA74 interval-ms \uC8FC\uAE30\uB9C8\uB2E4 \uC790\uB3D9 \uC218\uC9D1(\uAC12/1000/60 = \uBD84)
import.quasarzone.enabled=true
import.quasarzone.interval-ms=3600000
# \uC218\uC9D1\uB41C \uAC8C\uC2DC\uAE00\uC758 \uC791\uC131\uC790 \uC544\uC774\uB514 (\uC5C6\uC73C\uBA74 \uC790\uB3D9 \uC0DD\uC131 \u2014 \uB85C\uADF8\uC778 \uBD88\uAC00 \uC2DC\uC2A4\uD15C \uACC4\uC815)
import.author.username=\uCFFC\uC774\uC0AC\uC874
# \uC218\uC9D1\uB41C \uAC8C\uC2DC\uAE00\uC774 \uB4E4\uC5B4\uAC08 \uCE74\uD14C\uACE0\uB9AC\uBA85 (\uC5C6\uC73C\uBA74 \uC790\uB3D9 \uC0DD\uC131)
import.category.name=\uCFFC\uC774\uC0AC\uC874 \uD2B9\uAC00/\uC608\uD310

spring.config.import=optional:classpath:application-secret.properties