<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8"><title>이메일 인증</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <style>
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5;
            display:flex; justify-content:center; align-items:center; height:100vh; }
        .card { background:white; padding:40px; border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,.1); width:360px; text-align:center; }
        .icon { font-size:48px; margin-bottom:16px; }
        .btn  { display:inline-block; margin-top:20px; padding:12px 32px;
            background:#4f46e5; color:white; text-decoration:none;
            border-radius:8px; font-size:15px; }
    </style>
</head>
<body>
<!-- 회원가입 이메일 인증 결과 페이지 -->
<!-- AuthController.verifyEmail() 에서 토큰 검증 후 success/msg 를 Model 에 담아 렌더링 -->
<!-- success=true 이면 인증 완료 아이콘, false 이면 오류 아이콘 표시 -->
<div class="card">
    <div class="icon" th:text="${success} ? '✅' : '❌'"></div>
    <p th:text="${msg}" style="color:#444; font-size:16px;"></p>
    <a th:href="@{/auth/login}" class="btn">로그인 페이지로</a>
</div>
</body>
</html>
