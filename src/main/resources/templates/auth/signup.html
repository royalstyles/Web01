<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title>회원가입</title>
    <!--
        회원가입 페이지 (auth/signup.html)
        - POST /auth/signup 으로 아이디/비밀번호/이메일 전송
        - 비밀번호 정책: 8자 이상, 영문+숫자+특수문자 조합 (PasswordValidator 에서 검증)
        - 가입 성공 시 이메일로 인증 링크 발송 → 클릭 후 로그인 가능 (emailVerified = true)
        - 에러 메시지는 FlashAttribute(errorMsg) 로 전달
    -->
    <style>
        /* login.html 스타일 동일 적용 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5;
            display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 360px; }
        h2 { text-align: center; margin-bottom: 24px; color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 15px; }
        input:focus { outline: none; border-color: #4f46e5; }
        .btn { width: 100%; padding: 12px; background: #4f46e5; color: white;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #4338ca; }
        .msg { padding: 10px; border-radius: 6px; margin-bottom: 14px;
            font-size: 14px; text-align: center; }
        .error { background: #fee2e2; color: #dc2626; }
        .link { text-align: center; margin-top: 16px; font-size: 14px; }
        .link a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>📝 회원가입</h2>

    <div th:if="${errorMsg}" class="msg error" th:text="${errorMsg}"></div>

    <form th:action="@{/auth/signup}" method="post">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" name="username" placeholder="아이디 (4~20자)" required>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password"
                   placeholder="영문+숫자+특수문자 8자 이상" required>
        </div>
        <!-- ✅ 추가 -->
        <div class="form-group">
            <label>비밀번호 확인</label>
            <input type="password" name="confirmPassword"
                   placeholder="비밀번호를 다시 입력하세요" required>
        </div>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" placeholder="example@email.com" required>
        </div>
        <button class="btn" type="submit">가입하기</button>
    </form>

    <div class="link">
        이미 계정이 있으신가요? <a th:href="@{/auth/login}">로그인</a>
    </div>
</div>
</body>
</html>
