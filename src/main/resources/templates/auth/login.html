<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title>로그인</title>
    <!-- FOUC 방지: CSS 적용 전 data-theme 복원 -->
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <!--
        로그인 페이지 (auth/login.html)
        - Spring Security 의 폼 로그인 처리 URL: POST /auth/login
        - error 파라미터: 로그인 실패 메시지 표시 (아이디/비밀번호 불일치, 계정 잠금, 미인증)
        - 아이디 기억하기: 로컬스토리지에 username 저장 후 다음 방문 시 자동 입력
        - CSRF 토큰은 Thymeleaf 폼에서 th:action 사용 시 자동 삽입
    -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5;
            display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 360px; }
        h2 { text-align: center; margin-bottom: 24px; color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 15px; transition: border .2s; }
        input:focus { outline: none; border-color: #4f46e5; }
        .btn { width: 100%; padding: 12px; background: #4f46e5; color: white;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
            margin-top: 8px; transition: background .2s; }
        .btn:hover { background: #4338ca; }
        .msg { padding: 10px; border-radius: 6px; margin-bottom: 14px;
            font-size: 14px; text-align: center; }
        .error { background: #fee2e2; color: #dc2626; }
        .success { background: #dcfce7; color: #16a34a; }
        .link { text-align: center; margin-top: 16px; font-size: 14px; }
        .link a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 로그인</h2>

    <div th:if="${errorMsg}" class="msg error" th:text="${errorMsg}"></div>
    <div th:if="${logoutMsg}" class="msg success" th:text="${logoutMsg}"></div>
    <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" name="username" placeholder="아이디를 입력하세요" required autofocus>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호를 입력하세요" required
                   onkeydown="if(event.key==='Enter') this.form.requestSubmit();">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <div style="display:flex; align-items:center; gap:6px;">
                    <input type="checkbox" id="rememberMe" style="width:auto; accent-color:#4f46e5; cursor:pointer;">
                    <label for="rememberMe" style="margin:0; font-size:13px; color:#555; cursor:pointer;">아이디 기억하기</label>
                </div>
                <div style="display:flex; align-items:center; gap:6px;">
                    <input type="checkbox" id="autoLogin" name="remember-me" style="width:auto; accent-color:#4f46e5; cursor:pointer;">
                    <label for="autoLogin" style="margin:0; font-size:13px; color:#555; cursor:pointer;">
                        자동 로그인 <span style="color:#9ca3af; font-size:11px;">(30일)</span>
                    </label>
                </div>
            </div>
        </div>
        <button class="btn" type="submit">로그인</button>
    </form>

    <div class="link">
        계정이 없으신가요? <a th:href="@{/auth/signup}">회원가입</a>
    </div>

    <div th:if="${param.locked}" class="msg error">
        로그인 시도 횟수 초과로 계정이 잠겼습니다. 잠시 후 다시 시도해주세요.
    </div>

    <div th:if="${param.unverified}" class="msg error">
        이메일 인증이 완료되지 않았습니다. 메일함을 확인해주세요.
    </div>
</div>
<script>
    const usernameInput = document.querySelector('input[name="username"]');
    const rememberChk   = document.getElementById('rememberMe');

    // 페이지 로드 시 저장된 아이디 복원
    const savedId = localStorage.getItem('savedUsername');
    if (savedId) {
        usernameInput.value = savedId;
        rememberChk.checked = true;
    }

    // 폼 제출 시 체크 여부에 따라 저장/삭제
    document.querySelector('form').addEventListener('submit', function () {
        if (rememberChk.checked) {
            localStorage.setItem('savedUsername', usernameInput.value);
        } else {
            localStorage.removeItem('savedUsername');
        }
    });
</script>
</body>
</html>
