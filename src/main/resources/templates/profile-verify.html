<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title>본인 확인</title>
    <!--
        프로필 본인 확인 페이지 (profile-verify.html)
        - 프로필 페이지(/profile) 접근 전 현재 비밀번호를 한 번 더 확인하는 보안 페이지
        - 인증 성공 시 세션에 PROFILE_VERIFIED_AT 타임스탬프 저장 (10분 유효)
        - Model 속성: isLoggedIn, username, isAdmin, errorMsg(optional)
    -->
    <th:block th:replace="~{fragments/header :: headerStyles}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* 중앙 카드 래퍼 */
        .verify-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 56px); /* 헤더 높이 제외 */
            padding: 24px 16px;
        }

        .verify-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .12);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(79, 70, 229, .08);
        }

        /* 다크 모드 */
        [data-theme="dark"] .verify-card {
            background: #1e1b4b;
            border-color: rgba(255, 255, 255, .1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }

        /* 자물쇠 아이콘 영역 */
        .verify-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #ede9fe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        [data-theme="dark"] .verify-icon {
            background: rgba(109, 40, 217, .3);
        }

        .verify-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 6px;
        }

        [data-theme="dark"] .verify-title {
            color: #e0e7ff;
        }

        .verify-desc {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        [data-theme="dark"] .verify-desc {
            color: #9ca3af;
        }

        /* 에러 메시지 */
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }

        /* 폼 */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        [data-theme="dark"] label {
            color: #c7d2fe;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border .2s;
            background: white;
            color: #1f2937;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .1);
        }

        [data-theme="dark"] input[type="password"] {
            background: rgba(255, 255, 255, .07);
            border-color: rgba(255, 255, 255, .15);
            color: #e0e7ff;
        }

        [data-theme="dark"] input[type="password"]:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, .15);
        }

        /* 확인 버튼 */
        .btn-verify {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            margin-top: 4px;
        }

        .btn-verify:hover {
            background: #4338ca;
        }

        /* 취소 링크 */
        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
        }

        .cancel-link:hover {
            color: #4f46e5;
        }

        [data-theme="dark"] .cancel-link {
            color: #9ca3af;
        }

        [data-theme="dark"] .cancel-link:hover {
            color: #818cf8;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(boardName='본인 확인', rightMode='home')}"></div>

<div class="verify-wrapper">
    <div class="verify-card">
        <!-- 자물쇠 아이콘 -->
        <div class="verify-icon">🔒</div>

        <div class="verify-title">본인 확인</div>
        <div class="verify-desc">
            프로필 페이지에 접근하려면<br>현재 비밀번호를 입력해주세요.
        </div>

        <!-- 오류 메시지 -->
        <div th:if="${errorMsg}" class="error-msg" th:text="${errorMsg}"></div>

        <!-- 비밀번호 확인 폼 -->
        <form th:action="@{/profile/verify}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="password">현재 비밀번호</label>
                <input type="password" id="password" name="password"
                       placeholder="비밀번호를 입력하세요"
                       required autofocus
                       onkeydown="if(event.key==='Enter') this.form.requestSubmit();">
            </div>
            <button type="submit" class="btn-verify">확인</button>
        </form>

        <a href="javascript:history.back();" class="cancel-link">← 돌아가기</a>
    </div>
</div>
</body>
</html>
