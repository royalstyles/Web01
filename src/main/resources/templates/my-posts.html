<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title>내가 쓴 글</title>
    <th:block th:replace="~{fragments/header :: headerStyles}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .wrapper { max-width: 1000px; margin: 32px auto; padding: 0 20px 60px; }

        /* 알림 */
        .alert { padding: 12px 18px; border-radius: 8px; margin-bottom: 20px;
            font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

        /* 페이지 타이틀 */
        .page-title {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .page-title h2 {
            font-size: 20px; font-weight: 700; color: #1e1b4b;
        }
        .page-title .total-count {
            font-size: 14px; color: #6b7280;
        }

        /* 테이블 카드 */
        .table-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden;
            margin-bottom: 20px;
        }
        .table-top {
            padding: 16px 20px; border-bottom: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-top h3 { font-size: 15px; font-weight: 600; color: #1e1b4b; }
        .btn-write {
            padding: 8px 20px; background: #4f46e5; color: white;
            border-radius: 8px; text-decoration: none; font-size: 14px;
            font-weight: 500; transition: background .15s;
        }
        .btn-write:hover { background: #4338ca; }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: #f8fafc; padding: 11px 16px;
            text-align: left; font-size: 12px; font-weight: 600;
            color: #6b7280; text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 1px solid #e2e8f0;
        }
        tbody td {
            padding: 14px 16px; font-size: 14px; color: #374151;
            border-bottom: 1px solid #f1f5f9; vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafbff; }

        .post-title a { color: #1e1b4b; text-decoration: none; font-weight: 500; }
        .post-title a:hover { color: #4f46e5; text-decoration: underline; }
        .badge-cat {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
            background: #ede9fe; color: #6d28d9; margin-right: 6px;
        }
        .meta { font-size: 12px; color: #9ca3af; margin-top: 3px; }
        td.num { color: #9ca3af; font-size: 13px; text-align: center; }

        /* 액션 버튼 */
        .action-group { display: flex; gap: 6px; justify-content: center; }
        .btn-edit {
            padding: 5px 12px; font-size: 12px; border-radius: 6px;
            background: #ede9fe; color: #6d28d9; text-decoration: none;
            transition: background .15s; white-space: nowrap;
        }
        .btn-edit:hover { background: #ddd6fe; }
        .btn-delete {
            padding: 5px 12px; font-size: 12px; border-radius: 6px;
            background: #fee2e2; color: #dc2626; border: none; cursor: pointer;
            font-family: inherit; transition: background .15s; white-space: nowrap;
        }
        .btn-delete:hover { background: #fecaca; }

        /* 빈 목록 */
        .empty { text-align: center; padding: 60px 0; color: #9ca3af; font-size: 15px; }
        .empty a {
            display: inline-block; margin-top: 12px; padding: 10px 24px;
            background: #4f46e5; color: white; border-radius: 8px;
            text-decoration: none; font-size: 14px;
        }

        /* 페이징 */
        .pagination {
            display: flex; justify-content: center; gap: 6px; margin-top: 20px;
        }
        .page-btn {
            padding: 7px 13px; border-radius: 8px; font-size: 14px;
            border: 1px solid #e2e8f0; background: white; color: #374151;
            text-decoration: none; transition: all .15s;
        }
        .page-btn:hover { border-color: #4f46e5; color: #4f46e5; }
        .page-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .page-btn.disabled { color: #d1d5db; pointer-events: none; }

        @media (max-width: 640px) {
            th.hide-sm, td.hide-sm { display: none; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader('내 글 관리', 'home')}"></div>

<div class="wrapper">

    <div th:if="${successMsg}" class="alert alert-success">✅ <span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}"   class="alert alert-error">❌ <span th:text="${errorMsg}"></span></div>

    <!-- 페이지 타이틀 -->
    <div class="page-title">
        <h2>📝 내가 쓴 글</h2>
        <span class="total-count">총 <strong th:text="${postPage.totalElements}">0</strong>건</span>
    </div>

    <!-- 게시글 목록 -->
    <div class="table-card">
        <div class="table-top">
            <h3 th:text="${postPage.totalElements} + '건'">0건</h3>
            <a th:href="@{/board/write}" class="btn-write">✏️ 새 글 쓰기</a>
        </div>

        <table>
            <thead>
            <tr>
                <th style="width:50px;" class="hide-sm">번호</th>
                <th>제목</th>
                <th style="width:90px;" class="hide-sm">작성일</th>
                <th style="width:60px;">조회</th>
                <th style="width:60px;">좋아요</th>
                <th style="width:120px;">관리</th>
            </tr>
            </thead>
            <tbody>
            <!-- 게시글 없을 때 -->
            <tr th:if="${#lists.isEmpty(posts)}">
                <td colspan="6">
                    <div class="empty">
                        📭 아직 작성한 글이 없습니다.
                        <br/>
                        <a th:href="@{/board/write}">첫 글 작성하기</a>
                    </div>
                </td>
            </tr>
            <!-- 게시글 목록 -->
            <tr th:each="post : ${posts}">
                <td class="num hide-sm" th:text="${post.id}"></td>
                <td class="post-title">
                    <span th:if="${post.category != null}"
                          class="badge-cat" th:text="${post.category.name}"></span>
                    <a th:href="@{/board/{id}(id=${post.id})}" th:text="${post.title}"></a>
                    <div class="meta">
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </td>
                <td class="num hide-sm" th:text="${#temporals.format(post.createdAt, 'MM/dd')}"></td>
                <td class="num" th:text="${post.viewCount}"></td>
                <td class="num" th:text="${post.likeCount}"></td>
                <td>
                    <div class="action-group">
                        <!-- 수정 버튼 -->
                        <a th:href="@{/board/{id}/edit(id=${post.id})}" class="btn-edit">수정</a>
                        <!-- 삭제 버튼 -->
                        <form th:action="@{/my-posts/{id}/delete(id=${post.id})}" method="post"
                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="page" th:value="${currentPage}"/>
                            <button type="submit" class="btn-delete">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <div class="pagination" th:if="${postPage.totalPages > 1}">
        <a th:href="@{/my-posts(page=0)}"
           th:class="${postPage.first} ? 'page-btn disabled' : 'page-btn'">«</a>

        <a th:each="i : ${#numbers.sequence(0, postPage.totalPages - 1)}"
           th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
           th:href="@{/my-posts(page=${i})}"
           th:text="${i + 1}"
           th:class="${i == currentPage} ? 'page-btn active' : 'page-btn'"></a>

        <a th:href="@{/my-posts(page=${postPage.totalPages - 1})}"
           th:class="${postPage.last} ? 'page-btn disabled' : 'page-btn'">»</a>
    </div>

</div>
</body>
</html>
