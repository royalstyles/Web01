<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title>홈 — Web01</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ── 네비게이션 ── */
        .navbar {
            background: #4f46e5;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(79,70,229,.35);
            height: 56px;
        }

        .navbar-brand {
            font-size: 18px;
            font-weight: 700;
            color: white;
            letter-spacing: -.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        a.navbar-brand {
            text-decoration: none;
            color: white;
        }

        /* 내 정보 칩 */
        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,.15);
            border-radius: 24px;
            padding: 5px 14px 5px 6px;
            margin-right: 4px;
        }
        .user-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
        }
        .user-info-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: white;
        }
        .user-role {
            font-size: 10px;
            color: rgba(255,255,255,.7);
        }

        .nav-btn {
            color: white;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255,255,255,.12);
            transition: background .2s;
            white-space: nowrap;
        }
        .nav-btn:hover { background: rgba(255,255,255,.25); }

        .nav-logout-btn {
            background: none;
            border: 1px solid rgba(255,255,255,.3);
            color: white;
            font-size: 13px;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }
        .nav-logout-btn:hover {
            background: rgba(255,255,255,.15);
            border-color: rgba(255,255,255,.5);
        }

        /* ── 본문 ── */
        .wrapper {
            max-width: 1000px;
            margin: 28px auto;
            padding: 0 20px 60px;
        }

        /* ── 알림 ── */
        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

        /* ── 게시판 헤더 ── */
        .board-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .board-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1e1b4b;
        }
        .btn-write {
            padding: 9px 22px;
            background: #4f46e5;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: background .15s;
        }
        .btn-write:hover { background: #4338ca; }

        /* ── 필터 바 ── */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .cat-btn {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            color: #6b7280;
            transition: all .15s;
            text-decoration: none;
        }
        .cat-btn:hover, .cat-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        .search-wrap {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        .search-wrap input {
            padding: 7px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            width: 200px;
            font-family: inherit;
        }
        .search-wrap input:focus { outline: none; border-color: #4f46e5; }
        .btn-search {
            padding: 7px 18px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── 게시글 테이블 ── */
        .table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .table-top {
            padding: 14px 18px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-top-left {
            font-size: 14px;
            color: #6b7280;
        }
        .table-top-left strong { color: #1e1b4b; }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: #f8fafc;
            padding: 10px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid #e2e8f0;
        }
        tbody td {
            padding: 13px 16px;
            font-size: 14px;
            color: #374151;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafbff; }

        .post-title-link {
            color: #1e1b4b;
            text-decoration: none;
            font-weight: 500;
        }
        .post-title-link:hover { color: #4f46e5; text-decoration: underline; }

        .badge-cat {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: #ede9fe;
            color: #6d28d9;
            margin-right: 6px;
        }

        .meta-date {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 2px;
        }

        td.num {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
        }

        .empty-row td {
            text-align: center;
            padding: 60px 0;
            color: #9ca3af;
            font-size: 15px;
        }

        /* ── 페이징 ── */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
        }
        .page-btn {
            padding: 7px 13px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #374151;
            text-decoration: none;
            transition: all .15s;
        }
        .page-btn:hover { border-color: #4f46e5; color: #4f46e5; }
        .page-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .page-btn.disabled { color: #d1d5db; pointer-events: none; }

        @media (max-width: 640px) {
            .navbar { padding: 0 16px; }
            .search-wrap { margin-left: 0; width: 100%; }
            .search-wrap input { flex: 1; }
            th.hide-sm, td.hide-sm { display: none; }
            .user-info-text { display: none; }
        }
    </style>
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar">
    <a th:href="@{/home}" class="navbar-brand">
        🏠 Home
        <span th:if="${currentCategoryName != null}"
              style="font-weight:400; opacity:.75; margin-left:6px;">
        / <span th:text="${currentCategoryName}"></span>
    </span>
    </a>

    <div class="navbar-right">
        <!-- 내 정보 칩 -->
        <div class="user-chip">
            <div class="user-avatar"
                 th:text="${#strings.substring(username, 0, 1).toUpperCase()}">A</div>
            <div class="user-info-text">
                <span class="user-name" th:text="${username}">username</span>
                <span class="user-role" th:text="${isAdmin} ? '관리자' : '일반 회원'">일반 회원</span>
            </div>
        </div>

        <a th:href="@{/profile}" class="nav-btn">⚙️ 프로필</a>
        <a th:if="${isAdmin}" th:href="@{/admin}" class="nav-btn">👑 관리자</a>

        <form th:action="@{/auth/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="nav-logout-btn">로그아웃</button>
        </form>
    </div>
</nav>

<div class="wrapper">

    <div th:if="${successMsg}" class="alert alert-success">✅ <span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}"   class="alert alert-error">❌ <span th:text="${errorMsg}"></span></div>

    <!-- 게시판 헤더 -->
    <div class="board-header">
        <h1>📋 게시판</h1>
        <a th:href="@{/board/write}" class="btn-write">✏️ 글쓰기</a>
    </div>

    <!-- 카테고리 필터 + 검색 -->
    <div class="filter-bar">
        <a th:href="@{/home}"
           th:class="${categoryId == null} ? 'cat-btn active' : 'cat-btn'">전체</a>
        <a th:each="cat : ${categories}"
           th:href="@{/home(categoryId=${cat.id})}"
           th:text="${cat.name}"
           th:class="${categoryId == cat.id} ? 'cat-btn active' : 'cat-btn'"></a>

        <form class="search-wrap" th:action="@{/home}" method="get">
            <input th:if="${categoryId != null}" type="hidden" name="categoryId" th:value="${categoryId}"/>
            <input type="text" name="keyword" placeholder="제목 검색..." th:value="${keyword}"/>
            <button type="submit" class="btn-search">검색</button>
        </form>
    </div>

    <!-- 게시글 목록 -->
    <div class="table-card">
        <div class="table-top">
            <span class="table-top-left">
                전체 <strong th:text="${postPage.totalElements}">0</strong>건
                <th:block th:if="${keyword != null and !#strings.isEmpty(keyword)}">
                    — "<strong th:text="${keyword}"></strong>" 검색 결과
                </th:block>
            </span>
        </div>

        <table>
            <thead>
            <tr>
                <th style="width:50px;" class="hide-sm">번호</th>
                <th>제목</th>
                <th style="width:100px;" class="hide-sm">작성자</th>
                <th style="width:90px;"  class="hide-sm">작성일</th>
                <th style="width:55px;">조회</th>
                <th style="width:55px;">좋아요</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(posts)}" class="empty-row">
                <td colspan="6">📭 게시글이 없습니다.</td>
            </tr>
            <tr th:each="post : ${posts}">
                <td class="num hide-sm" th:text="${post.id}"></td>
                <td>
                    <span th:if="${post.category != null}"
                          class="badge-cat" th:text="${post.category.name}"></span>
                    <a th:href="@{/board/{id}(id=${post.id})}"
                       th:text="${post.title}"
                       class="post-title-link"></a>
                    <div class="meta-date hide-sm"
                         th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                </td>
                <td class="hide-sm" th:text="${post.author.username}"></td>
                <td class="num hide-sm"
                    th:text="${#temporals.format(post.createdAt, 'MM/dd')}"></td>
                <td class="num" th:text="${post.viewCount}"></td>
                <td class="num" th:text="${post.likeCount}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <div class="pagination" th:if="${postPage.totalPages > 1}">
        <a th:href="@{/home(page=0, categoryId=${categoryId}, keyword=${keyword})}"
           th:class="${postPage.first} ? 'page-btn disabled' : 'page-btn'">«</a>

        <a th:each="i : ${#numbers.sequence(0, postPage.totalPages - 1)}"
           th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
           th:href="@{/home(page=${i}, categoryId=${categoryId}, keyword=${keyword})}"
           th:text="${i + 1}"
           th:class="${i == currentPage} ? 'page-btn active' : 'page-btn'"></a>

        <a th:href="@{/home(page=${postPage.totalPages - 1}, categoryId=${categoryId}, keyword=${keyword})}"
           th:class="${postPage.last} ? 'page-btn disabled' : 'page-btn'">»</a>
    </div>

</div>
</body>
</html>
