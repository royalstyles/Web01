<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="headerStyles">
        <style>
            /* ── 공통 헤더 ── */
            .site-header {
                background: #4f46e5;
                padding: 0 32px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: sticky;
                top: 0;
                z-index: 100;
                box-shadow: 0 2px 12px rgba(79, 70, 229, .35);
                height: 56px;
            }

            /* 왼쪽: 홈 아이콘 + 게시판 이름 */
            .header-left {
                display: flex;
                align-items: center;
                gap: 10px;
                text-decoration: none;
                flex-shrink: 0;
            }

            .header-home-icon {
                width: 34px;
                height: 34px;
                border-radius: 8px;
                background: rgba(255, 255, 255, .2);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                transition: background .2s;
                flex-shrink: 0;
            }

            .header-home-icon:hover {
                background: rgba(255, 255, 255, .35);
            }

            .header-board-name {
                font-size: 16px;
                font-weight: 600;
                color: white;
                letter-spacing: -.2px;
                white-space: nowrap;
            }

            .header-board-separator {
                color: rgba(255, 255, 255, .45);
                font-size: 14px;
                margin: 0 2px;
            }

            /* 오른쪽: 유저 영역 */
            .header-right {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            /* 유저 칩 (로그인 상태) */
            .header-user-chip {
                display: flex;
                align-items: center;
                gap: 8px;
                background: rgba(255, 255, 255, .15);
                border-radius: 24px;
                padding: 5px 14px 5px 6px;
                margin-right: 2px;
            }

            .header-avatar {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: rgba(255, 255, 255, .3);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: 700;
                color: white;
                overflow: hidden;
                flex-shrink: 0;
            }

            .header-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .header-user-info {
                display: flex;
                flex-direction: column;
                line-height: 1.1;
            }

            .header-username {
                font-size: 13px;
                font-weight: 600;
                color: white;
            }

            .header-role {
                font-size: 10px;
                color: rgba(255, 255, 255, .7);
            }

            /* 공통 nav 버튼 */
            .header-btn {
                color: white;
                text-decoration: none;
                font-size: 13px;
                padding: 6px 14px;
                border-radius: 6px;
                background: rgba(255, 255, 255, .12);
                transition: background .2s;
                white-space: nowrap;
                border: none;
                cursor: pointer;
                font-family: inherit;
                display: inline-flex;
                align-items: center;
                gap: 4px;
            }

            .header-btn:hover {
                background: rgba(255, 255, 255, .25);
            }

            /* 로그아웃은 테두리 스타일 */
            .header-btn-outline {
                background: none;
                border: 1px solid rgba(255, 255, 255, .3);
            }

            .header-btn-outline:hover {
                background: rgba(255, 255, 255, .15);
                border-color: rgba(255, 255, 255, .5);
            }

            @media (max-width: 640px) {
                .site-header {
                    padding: 0 16px;
                }

                .header-user-info {
                    display: none;
                }

                .header-board-name {
                    font-size: 14px;
                }
            }
        </style>
    </th:block>
</head>

<body>
<!--
    공통 헤더 fragment
    사용법:
        <div th:replace="~{fragments/header :: siteHeader(boardName='게시판', rightMode='home')}"></div>

    파라미터:
        boardName    - 헤더 왼쪽에 표시될 게시판/페이지 이름
        rightMode    - 우측 버튼 구성 모드
                       'home'    : 비로그인(로그인·회원가입) / 로그인(유저칩·프로필·관리자·로그아웃)  [기본값]
                       'admin'   : 프로필 + 로그아웃
                       'profile' : 뒤로가기(홈) + 로그아웃

    model 에서 자동 참조:
        isLoggedIn, username, isAdmin, profileImage
-->
<header class="site-header" th:fragment="siteHeader(boardName, rightMode)">

    <!-- ── 왼쪽: 홈 아이콘 + 페이지 이름 ── -->
    <div style="display:flex; align-items:center; gap:10px;">

        <!-- 집 아이콘 (홈 링크) -->
        <a th:href="@{/home}" class="header-home-icon" title="홈으로">🏠</a>

        <!-- 페이지 이름 -->
        <th:block th:if="${boardName != null and !#strings.isEmpty(boardName)}">
            <span class="header-board-separator">/</span>
            <span class="header-board-name" th:text="${boardName}"></span>
        </th:block>
        <th:block th:if="${boardName == null or #strings.isEmpty(boardName)}">
            <span class="header-board-name">Web01</span>
        </th:block>
    </div>

    <!-- ── 오른쪽: rightMode 분기 ── -->
    <div class="header-right">

        <!-- ════ home 모드 (기본) ════ -->
        <th:block th:if="${rightMode == null or rightMode == 'home'}">

            <!-- 로그인 상태 -->
            <th:block th:if="${isLoggedIn}">
                <!-- 유저 칩 -->
                <div class="header-user-chip">
                    <div class="header-avatar">
                        <img th:if="${profileImage != null}" th:src="${profileImage}" alt="프로필"/>
                        <span th:unless="${profileImage != null}"
                              th:text="${#strings.substring(username, 0, 1).toUpperCase()}"></span>
                    </div>
                    <div class="header-user-info">
                        <span class="header-username" th:text="${username}">username</span>
                        <span class="header-role" th:text="${isAdmin} ? '관리자' : '일반 회원'"></span>
                    </div>
                </div>
                <a th:href="@{/my-posts}" class="header-btn">📝 내 글 관리</a>
                <a th:href="@{/profile}" class="header-btn">⚙️ 프로필</a>
                <a th:if="${isAdmin}" th:href="@{/admin}" class="header-btn">👑 관리자</a>
                <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="header-btn header-btn-outline">로그아웃</button>
                </form>
            </th:block>

            <!-- 비로그인 상태 -->
            <th:block th:unless="${isLoggedIn}">
                <a th:href="@{/auth/login}"  class="header-btn">로그인</a>
                <a th:href="@{/auth/signup}" class="header-btn">회원가입</a>
            </th:block>
        </th:block>

        <!-- ════ admin 모드: 프로필 + 로그아웃 ════ -->
        <th:block th:if="${rightMode == 'admin'}">
            <a th:href="@{/profile}" class="header-btn">⚙️ 프로필</a>
            <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="header-btn header-btn-outline">로그아웃</button>
            </form>
        </th:block>

        <!-- ════ profile 모드: 뒤로가기 + 로그아웃 ════ -->
        <th:block th:if="${rightMode == 'profile'}">
            <a th:href="@{/home}" class="header-btn">← 뒤로가기</a>
            <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="header-btn header-btn-outline">로그아웃</button>
            </form>
        </th:block>

    </div>
</header>

</body>
</html>
