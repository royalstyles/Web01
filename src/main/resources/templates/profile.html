<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title>프로필 수정</title>
    <th:block th:replace="~{fragments/header :: headerStyles}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ── 네비게이션 ── */
        .navbar {
            background: #4f46e5; color: white;
            padding: 14px 32px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(79,70,229,.3);
        }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .navbar a {
            color: white; text-decoration: none; font-size: 14px;
            padding: 6px 14px; border-radius: 6px;
            background: rgba(255,255,255,.15); transition: background .2s;
        }
        .navbar a:hover { background: rgba(255,255,255,.25); }

        /* ── 레이아웃 ── */
        .wrapper {
            max-width: 680px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        /* ── 프로필 헤더 카드 ── */
        .profile-header {
            background: white;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,.06);
            margin-bottom: 24px;
        }

        /* 아바타 래퍼 */
        .avatar-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }
        .avatar-ring {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 700; color: white;
        }
        .avatar-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4f46e5;
            display: block;
        }

        /* 카메라 오버레이 버튼 */
        .avatar-edit-label {
            position: absolute;
            bottom: 0; right: 0;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 13px;
            border: 2px solid white;
            transition: background .2s;
        }
        .avatar-edit-label:hover { background: #4338ca; }

        /* 이미지 삭제 버튼 */
        .btn-img-delete {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 12px;
            background: none;
            border: 1px solid #fca5a5;
            color: #dc2626;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all .15s;
            font-family: inherit;
        }
        .btn-img-delete:hover { background: #fee2e2; }

        .profile-name { font-size: 22px; font-weight: 700; color: #1e1b4b; }
        .profile-email { font-size: 14px; color: #6b7280; margin-top: 4px; }
        .profile-badge {
            display: inline-block;
            padding: 3px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-top: 10px;
        }
        .badge-admin { background: #fef3c7; color: #d97706; }
        .badge-user  { background: #dbeafe; color: #2563eb; }
        .badge-unverified { background: #fee2e2; color: #dc2626; margin-left: 6px; }

        /* ── 알림 ── */
        .alert {
            padding: 12px 18px; border-radius: 10px;
            margin-bottom: 20px; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

        /* ── 섹션 카드 ── */
        .section-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.06);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .section-header {
            padding: 18px 24px 14px;
            border-bottom: 1px solid #f1f5f9;
            display: flex; align-items: center; gap: 10px;
        }
        .section-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .icon-indigo { background: #ede9fe; }
        .icon-blue   { background: #dbeafe; }
        .icon-amber  { background: #fef3c7; }
        .section-title { font-size: 15px; font-weight: 600; color: #1e1b4b; }
        .section-subtitle { font-size: 12px; color: #9ca3af; margin-top: 2px; }
        .section-body { padding: 20px 24px; }

        /* ── 폼 요소 ── */
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 13px;
            color: #6b7280; font-weight: 500; }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%; padding: 10px 14px;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; color: #1e1b4b;
            transition: border .2s, box-shadow .2s;
            background: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,.12);
            background: white;
        }
        .input-current {
            font-size: 13px; color: #9ca3af;
            padding: 8px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* ── 버튼 ── */
        .btn {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity .15s, transform .1s;
            font-family: inherit;
        }
        .btn:hover { opacity: .88; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary   { background: #4f46e5; color: white; }
        .btn-amber     { background: #f59e0b; color: white; }
        .btn-full      { width: 100%; }

        /* ── 비밀번호 강도 표시 ── */
        .strength-bar {
            height: 4px; border-radius: 4px;
            background: #e2e8f0; margin-top: 8px; overflow: hidden;
        }
        .strength-fill {
            height: 100%; border-radius: 4px;
            transition: width .3s, background .3s;
        }
        .strength-hint { font-size: 11px; margin-top: 4px; }

        /* ── 구분선 ── */
        .divider { height: 1px; background: #f1f5f9; margin: 4px 0 16px; }

        /* ── 이메일 변경 안내 ── */
        .info-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px; color: #0369a1;
            display: flex; gap: 8px; align-items: flex-start;
            margin-bottom: 16px;
        }

        @media (max-width: 500px) {
            .wrapper { padding: 0 12px 40px; }
            .section-body { padding: 16px; }
        }
    </style>
</head>
<body>

<!-- 프로필 페이지 -->
<div th:replace="~{fragments/header :: siteHeader('프로필 수정', 'profile')}"></div>

<div class="wrapper">

    <!-- 알림 -->
    <div th:if="${successMsg}" class="alert alert-success">
        ✅ <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert-error">
        ❌ <span th:text="${errorMsg}"></span>
    </div>

    <!-- 프로필 헤더 -->
    <div class="profile-header">

        <!-- 아바타 + 카메라 버튼 -->
        <div class="avatar-wrap">

            <!-- 이미지 없음: 이니셜 -->
            <div class="avatar-ring"
                 th:unless="${user.profileImage != null}"
                 th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">A</div>

            <!-- 이미지 있음 -->
            <img th:if="${user.profileImage != null}"
                 th:src="${user.profileImage}"
                 class="avatar-img"
                 alt="프로필 이미지"/>

            <!-- 카메라 오버레이 (파일 선택 트리거) -->
            <label class="avatar-edit-label" for="profile-image-input" title="이미지 변경">📷</label>
            <input id="profile-image-input" type="file" accept="image/*"
                   style="display:none;" onchange="submitProfileImage(this)"/>
        </div>

        <!-- 이미지 삭제 버튼 (이미지 있을 때만) -->
        <div th:if="${user.profileImage != null}">
            <form th:action="@{/profile/image/delete}" method="post"
                  onsubmit="return confirm('프로필 이미지를 삭제하시겠습니까?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-img-delete">🗑 이미지 삭제</button>
            </form>
        </div>

        <div class="profile-name" th:text="${user.username}" style="margin-top:8px;">username</div>
        <div class="profile-email" th:text="${user.email}">email</div>
        <span th:class="${user.role.name() == 'ROLE_ADMIN'} ? 'profile-badge badge-admin' : 'profile-badge badge-user'"
              th:text="${user.role.name() == 'ROLE_ADMIN'} ? '👑 관리자' : '👤 일반 회원'"></span>
        <span th:unless="${user.emailVerified}" class="profile-badge badge-unverified">📧 이메일 미인증</span>
    </div>

    <!-- ① 아이디 변경 -->
    <div class="section-card">
        <div class="section-header">
            <div class="section-icon icon-indigo">🔤</div>
            <div>
                <div class="section-title">아이디 변경</div>
                <div class="section-subtitle">변경 후 자동으로 로그아웃됩니다</div>
            </div>
        </div>
        <div class="section-body">
            <div class="input-current">현재 아이디: <strong th:text="${user.username}"></strong></div>
            <form th:action="@{/profile/username}" method="post"
                  onsubmit="return confirm('아이디를 변경하면 로그아웃됩니다. 계속하시겠습니까?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>새 아이디 (4~20자)</label>
                    <input type="text" name="newUsername" placeholder="새 아이디 입력" required
                           minlength="4" maxlength="20">
                </div>
                <button type="submit" class="btn btn-primary btn-full">아이디 변경</button>
            </form>
        </div>
    </div>

    <!-- ② 비밀번호 변경 -->
    <div class="section-card">
        <div class="section-header">
            <div class="section-icon icon-blue">🔒</div>
            <div>
                <div class="section-title">비밀번호 변경</div>
                <div class="section-subtitle">영문 + 숫자 + 특수문자, 8자 이상</div>
            </div>
        </div>
        <div class="section-body">
            <form th:action="@{/profile/password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>현재 비밀번호</label>
                    <input type="password" name="currentPassword" placeholder="현재 비밀번호" required>
                </div>
                <div class="divider"></div>
                <div class="form-group">
                    <label>새 비밀번호</label>
                    <input type="password" name="newPassword" id="newPw"
                           placeholder="새 비밀번호 (8자 이상)" required oninput="checkStrength(this.value)">
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-hint" id="strengthHint"></div>
                </div>
                <div class="form-group">
                    <label>새 비밀번호 확인</label>
                    <input type="password" name="confirmNewPassword"
                           placeholder="새 비밀번호 재입력" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">비밀번호 변경</button>
            </form>
        </div>
    </div>

    <!-- ③ 이메일 변경 -->
    <div class="section-card">
        <div class="section-header">
            <div class="section-icon icon-amber">✉️</div>
            <div>
                <div class="section-title">이메일 변경</div>
                <div class="section-subtitle">새 이메일로 인증 메일이 발송됩니다</div>
            </div>
        </div>
        <div class="section-body">
            <div class="info-box">
                ℹ️ 새 이메일 주소로 인증 링크가 발송됩니다. 링크 클릭 후 이메일이 변경되며, 유효 시간은 24시간입니다.
            </div>
            <div class="input-current">현재 이메일: <strong th:text="${user.email}"></strong></div>
            <form th:action="@{/profile/email}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>새 이메일 주소</label>
                    <input type="email" name="newEmail" placeholder="새 이메일 입력" required>
                </div>
                <button type="submit" class="btn btn-amber btn-full">인증 메일 발송</button>
            </form>
        </div>
    </div>

</div>

<script th:inline="javascript">
    const csrfParam = /*[[${_csrf.parameterName}]]*/ '_csrf';
    const csrfToken = /*[[${_csrf.token}]]*/ '';

    // 프로필 이미지 선택 즉시 폼 제출
    function submitProfileImage(input) {
        if (!input.files[0]) return;

        const form = document.createElement('form');
        form.method = 'post';
        form.action = '/profile/image';
        form.enctype = 'multipart/form-data';

        const csrf = document.createElement('input');
        csrf.type  = 'hidden';
        csrf.name  = csrfParam;
        csrf.value = csrfToken;
        form.appendChild(csrf);

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.name = 'profileImage';
        const dt = new DataTransfer();
        dt.items.add(input.files[0]);
        fileInput.files = dt.files;
        form.appendChild(fileInput);

        document.body.appendChild(form);
        form.submit();
    }

    // 비밀번호 강도 표시
    function checkStrength(pw) {
        const fill = document.getElementById('strengthFill');
        const hint = document.getElementById('strengthHint');
        let score = 0;
        if (pw.length >= 8)  score++;
        if (/[a-zA-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)) score++;

        const levels = [
            { pct: '0%',   color: '#e2e8f0', text: '' },
            { pct: '25%',  color: '#ef4444', text: '❌ 매우 약함' },
            { pct: '50%',  color: '#f59e0b', text: '⚠️ 약함' },
            { pct: '75%',  color: '#3b82f6', text: '🔵 보통' },
            { pct: '100%', color: '#22c55e', text: '✅ 강함' },
        ];
        const lv = levels[score] || levels[0];
        fill.style.width = lv.pct;
        fill.style.background = lv.color;
        hint.textContent = lv.text;
        hint.style.color = lv.color;
    }
</script>
</body>
</html>
