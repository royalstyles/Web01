<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title th:text="${post != null} ? '게시글 수정' : '게시글 작성'">게시글 작성</title>
    <!-- Quill.js CDN -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .navbar {
            background: #4f46e5; color: white;
            padding: 14px 32px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(79,70,229,.3);
        }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .navbar a { color: white; text-decoration: none; font-size: 14px;
            padding: 6px 14px; border-radius: 6px;
            background: rgba(255,255,255,.15); }
        .navbar a:hover { background: rgba(255,255,255,.25); }

        .wrapper { max-width: 860px; margin: 32px auto; padding: 0 20px 80px; }

        .card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            padding: 32px;
        }
        .card-title { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 24px; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #6b7280;
            font-weight: 500; margin-bottom: 6px; }
        select, input[type="text"] {
            width: 100%; padding: 10px 14px;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; color: #1e1b4b; background: #fafafa;
            transition: border .2s;
        }
        select:focus, input:focus {
            outline: none; border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,.1);
        }

        /* Quill 에디터 영역 */
        #editor-container {
            border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;
        }
        #editor-container .ql-toolbar {
            border: none; border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        #editor-container .ql-container {
            border: none; font-size: 15px; min-height: 400px;
        }
        #editor-container .ql-editor { min-height: 400px; }

        /* 동영상 업로드 버튼 */
        .video-upload-wrap {
            margin-top: 8px; display: flex; align-items: center; gap: 10px;
        }
        .btn-video {
            padding: 7px 16px; background: #f0f2f5; color: #374151;
            border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px;
            cursor: pointer; transition: background .15s;
        }
        .btn-video:hover { background: #e2e8f0; }
        #video-progress { font-size: 13px; color: #6b7280; display: none; }

        /* 하단 버튼 */
        .btn-wrap { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
        .btn-cancel {
            padding: 10px 24px; border-radius: 8px; font-size: 14px;
            background: #f1f5f9; color: #374151; border: none; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .btn-submit {
            padding: 10px 28px; border-radius: 8px; font-size: 14px;
            background: #4f46e5; color: white; border: none; cursor: pointer;
            font-weight: 600; transition: background .15s;
        }
        .btn-submit:hover { background: #4338ca; }

        /* Quill 본문 내 동영상 */
        .ql-editor video { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="navbar-brand" th:text="${post != null} ? '✏️ 게시글 수정' : '✏️ 게시글 작성'"></span>
    <a th:href="@{/board}">← 목록으로</a>
</nav>

<div class="wrapper">
    <div class="card">
        <p class="card-title" th:text="${post != null} ? '게시글 수정' : '새 게시글 작성'"></p>

        <form id="post-form"
              th:action="${post != null} ? @{/board/{id}/edit(id=${post.id})} : @{/board/write}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <!-- 실제 에디터 내용을 담을 hidden input -->
            <input type="hidden" id="content-input" name="content" th:value="${post?.content}"/>

            <!-- 카테고리 -->
            <div class="form-group">
                <label>카테고리</label>
                <select name="categoryId">
                    <option value="">카테고리 없음</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${post != null and post.category != null and post.category.id == cat.id}">
                    </option>
                </select>
            </div>

            <!-- 제목 -->
            <div class="form-group">
                <label>제목 <span style="color:#dc2626">*</span></label>
                <input type="text" name="title" placeholder="제목을 입력하세요"
                       th:value="${post?.title}" required maxlength="200">
            </div>

            <!-- Quill 에디터 -->
            <div class="form-group">
                <label>내용 <span style="color:#dc2626">*</span></label>
                <div id="editor-container">
                    <div id="editor"></div>
                </div>
                <!-- 동영상 업로드 -->
                <div class="video-upload-wrap">
                    <input type="file" id="video-file-input" accept="video/*" style="display:none"/>
                    <button type="button" class="btn-video" onclick="document.getElementById('video-file-input').click()">
                        🎬 동영상 업로드
                    </button>
                    <span id="video-progress"></span>
                </div>
            </div>

            <div class="btn-wrap">
                <a th:href="${post != null} ? @{/board/{id}(id=${post.id})} : @{/board}"
                   class="btn-cancel">취소</a>
                <button type="submit" class="btn-submit"
                        th:text="${post != null} ? '수정 완료' : '등록하기'">등록하기</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script th:inline="javascript">
    // ── CSRF 토큰 ──────────────────────────────────────────
    const csrfHeader = /*[[${_csrf.headerName}]]*/ '';
    const csrfToken  = /*[[${_csrf.token}]]*/ '';

    // ── 기존 본문 (수정 모드) ──────────────────────────────
    const existingContent = /*[[${post?.content}]]*/ null;

    // ── Quill 초기화 ───────────────────────────────────────
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [
                    [{ font: [] }, { size: ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ color: [] }, { background: [] }],
                    [{ align: [] }],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    ['blockquote', 'code-block'],
                    ['link', 'image'],
                    ['clean']
                ],
                handlers: {
                    // 이미지: 파일 선택 → 서버 업로드 → URL 삽입
                    image: imageUploadHandler
                }
            }
        },
        placeholder: '내용을 입력하세요...'
    });

    // 수정 모드: 기존 본문 로드
    if (existingContent) {
        quill.root.innerHTML = existingContent;
    }

    // ── 이미지 업로드 핸들러 ───────────────────────────────
    function imageUploadHandler() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async () => {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload/image', {
                    method: 'POST',
                    headers: { [csrfHeader]: csrfToken },
                    body: formData
                });
                const data = await res.json();
                if (data.url) {
                    const range = quill.getSelection(true);
                    quill.insertEmbed(range.index, 'image', data.url);
                    quill.setSelection(range.index + 1);
                } else {
                    alert('이미지 업로드 실패: ' + (data.error || '알 수 없는 오류'));
                }
            } catch (e) {
                alert('이미지 업로드 중 오류가 발생했습니다.');
            }
        };
        input.click();
    }

    // ── 동영상 업로드 핸들러 ───────────────────────────────
    document.getElementById('video-file-input').addEventListener('change', async function () {
        const file = this.files[0];
        if (!file) return;

        const progress = document.getElementById('video-progress');
        progress.style.display = 'inline';
        progress.textContent = '업로드 중...';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/api/upload/video', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData
            });
            const data = await res.json();
            if (data.url) {
                // Quill 2.x: video embed 삽입
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'video', data.url);
                quill.setSelection(range.index + 1);
                progress.textContent = '✅ 업로드 완료';
                setTimeout(() => { progress.style.display = 'none'; }, 2000);
            } else {
                progress.textContent = '❌ ' + (data.error || '업로드 실패');
            }
        } catch (e) {
            progress.textContent = '❌ 오류가 발생했습니다.';
        }
        this.value = '';
    });

    // ── 폼 제출: 에디터 HTML → hidden input ───────────────
    document.getElementById('post-form').addEventListener('submit', function (e) {
        const content = quill.root.innerHTML;
        if (content === '<p><br></p>' || content.trim() === '') {
            e.preventDefault();
            alert('내용을 입력해주세요.');
            return;
        }
        document.getElementById('content-input').value = content;
    });
</script>
</body>
</html>
