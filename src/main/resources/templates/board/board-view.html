<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글</title>
    <!-- Quill 뷰어 스타일 (에디터 없이 렌더링용) -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet"/>
    <th:block th:replace="~{fragments/header :: headerStyles}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .navbar {
            background: #4f46e5; color: white;
            padding: 14px 32px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(79,70,229,.3);
        }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .navbar a { color: white; text-decoration: none; font-size: 14px;
            padding: 6px 14px; border-radius: 6px;
            background: rgba(255,255,255,.15); }
        .navbar a:hover { background: rgba(255,255,255,.25); }

        .wrapper { max-width: 860px; margin: 32px auto; padding: 0 20px 80px; }

        /* 게시글 카드 */
        .post-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            overflow: hidden; margin-bottom: 20px;
        }
        .post-header { padding: 28px 32px 20px; border-bottom: 1px solid #f1f5f9; }
        .post-category {
            display: inline-block; padding: 3px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
            background: #ede9fe; color: #6d28d9; margin-bottom: 10px;
        }
        .post-title { font-size: 22px; font-weight: 700; color: #1e1b4b; line-height: 1.4; }
        .post-meta {
            display: flex; gap: 16px; margin-top: 12px;
            font-size: 13px; color: #9ca3af; flex-wrap: wrap;
        }
        .post-meta span { display: flex; align-items: center; gap: 4px; }

        /* 본문 */
        .post-body { padding: 28px 32px; }
        /* Quill 뷰어 렌더링 */
        .ql-snow .ql-editor { padding: 0; }
        .post-content img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
        .post-content video { max-width: 100%; border-radius: 8px; margin: 8px 0; }
        .post-content p { line-height: 1.8; margin-bottom: 8px; }

        /* 액션 버튼 */
        .post-actions {
            padding: 16px 32px; border-top: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .like-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 22px; border-radius: 24px; font-size: 14px;
            border: 2px solid #e2e8f0; background: white; cursor: pointer;
            transition: all .2s; font-weight: 500;
        }
        .like-btn.liked { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
        .like-btn:hover { border-color: #fca5a5; }
        .edit-btns { display: flex; gap: 8px; }
        .btn-edit, .btn-delete {
            padding: 7px 18px; border-radius: 8px; font-size: 13px;
            font-weight: 500; cursor: pointer; text-decoration: none;
            border: none; transition: opacity .15s;
        }
        .btn-edit   { background: #ede9fe; color: #6d28d9; }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .btn-edit:hover, .btn-delete:hover { opacity: .8; }

        /* 댓글 카드 */
        .comment-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            overflow: hidden;
        }
        .comment-header { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; }
        .comment-header h3 { font-size: 15px; font-weight: 600; color: #1e1b4b; }

        /* 댓글 목록 */
        #comment-list { padding: 0 8px; }
        .comment-item {
            padding: 14px 16px; border-bottom: 1px solid #f8fafc;
            display: flex; gap: 12px; align-items: flex-start;
        }
        .comment-item:last-child { border-bottom: none; }
        .comment-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: #4f46e5; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; flex-shrink: 0;
        }
        .comment-body { flex: 1; }
        .comment-author { font-size: 13px; font-weight: 600; color: #1e1b4b; }
        .comment-time   { font-size: 11px; color: #9ca3af; margin-left: 8px; }
        .comment-text   { font-size: 14px; color: #374151; margin-top: 4px; line-height: 1.6; }
        .comment-actions { display: flex; gap: 8px; margin-top: 6px; }
        .btn-cm {
            padding: 3px 10px; border-radius: 6px; font-size: 12px;
            border: none; cursor: pointer; transition: opacity .15s;
        }
        .btn-cm-edit   { background: #ede9fe; color: #6d28d9; }
        .btn-cm-delete { background: #fee2e2; color: #dc2626; }
        .btn-cm:hover  { opacity: .75; }

        /* 댓글 입력 */
        .comment-input-wrap { padding: 16px 24px; border-top: 1px solid #f1f5f9; }
        .comment-input-row { display: flex; gap: 10px; }
        .comment-input-row textarea {
            flex: 1; padding: 10px 14px;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; resize: none; height: 72px;
            font-family: inherit;
        }
        .comment-input-row textarea:focus { outline: none; border-color: #4f46e5; }
        .btn-comment {
            padding: 0 20px; background: #4f46e5; color: white;
            border: none; border-radius: 8px; font-size: 14px;
            cursor: pointer; font-weight: 600; white-space: nowrap;
        }

        /* 뒤로 가기 */
        .back-link {
            display: inline-block; margin-bottom: 16px;
            font-size: 14px; color: #6b7280; text-decoration: none;
        }
        .back-link:hover { color: #4f46e5; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(boardName='게시글', rightMode='home')}"></div>

<div class="wrapper">

    <a th:href="@{/board}" class="back-link">← 목록으로 돌아가기</a>

    <!-- 게시글 -->
    <div class="post-card">
        <div class="post-header">
            <div th:if="${post.category != null}"
                 class="post-category" th:text="${post.category.name}"></div>
            <div class="post-title" th:text="${post.title}"></div>
            <div class="post-meta">
                <span>👤 <span th:text="${post.author.username}"></span></span>
                <span>📅 <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span>
                <span>👁 <span th:text="${post.viewCount}"></span></span>
                <span>❤️ <span id="like-count" th:text="${post.likeCount}"></span></span>
            </div>
        </div>

        <!-- Quill 렌더링 본문 -->
        <div class="post-body">
            <div class="post-content ql-snow">
                <div class="ql-editor" th:utext="${post.content}"></div>
            </div>
        </div>

        <!-- 좋아요 + 수정/삭제 -->
        <div class="post-actions">
            <!-- 로그인 시 좋아요 버튼 -->
            <button th:if="${isLoggedIn}"
                    id="like-btn"
                    th:class="${liked} ? 'like-btn liked' : 'like-btn'"
                    th:data-post-id="${post.id}"
                    onclick="toggleLike(this)">
                <span th:text="${liked} ? '❤️' : '🤍'">🤍</span>
                <span>좋아요 <span id="like-count-btn" th:text="${post.likeCount}"></span></span>
            </button>

            <!-- 비로그인 시 좋아요 카운트만 표시 -->
            <span th:unless="${isLoggedIn}" class="like-btn" style="cursor:default;">
                ❤️ <span th:text="${post.likeCount}"></span>
            </span>

            <div class="edit-btns" th:if="${canEdit}">
                <a th:href="@{/board/{id}/edit(id=${post.id})}" class="btn-edit">수정</a>
                <form th:action="@{/board/{id}/delete(id=${post.id})}" method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?');" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-delete">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 댓글 -->
    <div class="comment-card">
        <div class="comment-header">
            <h3>댓글 <span id="comment-count" th:text="${#lists.size(comments)}">0</span>개</h3>
        </div>

        <div id="comment-list">
            <div th:each="comment : ${comments}"
                 th:id="'comment-' + ${comment.id}"
                 class="comment-item">
                <div class="comment-avatar"
                     th:text="${#strings.substring(comment.author.username, 0, 1).toUpperCase()}"></div>
                <div class="comment-body">
                    <span class="comment-author" th:text="${comment.author.username}"></span>
                    <span class="comment-time"
                          th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    <div class="comment-text" th:text="${comment.content}"></div>
                    <div class="comment-actions"
                         th:if="${comment.author.username == currentUsername}">
                        <button class="btn-cm btn-cm-edit"
                                th:onclick="'editComment(' + ${comment.id} + ', this)'">수정</button>
                        <button class="btn-cm btn-cm-delete"
                                th:onclick="'deleteComment(' + ${comment.id} + ')'">삭제</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 댓글 입력 -->
        <div class="comment-input-wrap">
            <!-- 로그인 시 댓글 입력 -->
            <div th:if="${isLoggedIn}" class="comment-input-row">
                <textarea id="comment-input" placeholder="댓글을 입력하세요..."></textarea>
                <button class="btn-comment"
                        th:data-post-id="${post.id}"
                        onclick="addComment(this)">등록</button>
            </div>
            <!-- 비로그인 시 안내 -->
            <div th:unless="${isLoggedIn}"
                 style="text-align:center; padding:16px; color:#9ca3af; font-size:14px;">
                <a th:href="@{/auth/login}" style="color:#4f46e5; text-decoration:none; font-weight:600;">
                    로그인
                </a> 후 댓글을 작성할 수 있습니다.
            </div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    // 비로그인 시 세션이 없어서 _csrf 객체가 null이 되는데, null 체크 없이 .headerName을 호출하다 세션 생성을 시도 → 이미 응답이 시작된 후라 실패 → 500 에러로 이어진 흐름 수정
    const csrfHeader = /*[[${_csrf != null ? _csrf.headerName : ''}]]*/ '';
    const csrfToken  = /*[[${_csrf != null ? _csrf.token : ''}]]*/ '';
    const currentUsername = /*[[${currentUsername}]]*/ '';

    // ── 좋아요 토글 ──────────────────────────────────────
    async function toggleLike(btn) {
        const postId = btn.dataset.postId;
        const res = await fetch(`/board/${postId}/like`, {
            method: 'POST',
            headers: { [csrfHeader]: csrfToken }
        });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }

        btn.classList.toggle('liked', data.liked);
        btn.querySelector('span:first-child').textContent = data.liked ? '❤️' : '🤍';
        document.getElementById('like-count').textContent = data.count;
        document.getElementById('like-count-btn').textContent = data.count;
    }

    // ── 댓글 등록 ────────────────────────────────────────
    async function addComment(btn) {
        const postId  = btn.dataset.postId;
        const input   = document.getElementById('comment-input');
        const content = input.value.trim();
        if (!content) { alert('댓글 내용을 입력해주세요.'); return; }

        const form = new URLSearchParams();
        form.append('content', content);

        const res = await fetch(`/board/${postId}/comments`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                [csrfHeader]: csrfToken
            },
            body: form
        });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }

        // DOM에 댓글 추가
        appendComment(data);
        input.value = '';
        updateCommentCount(1);
    }

    // ── 댓글 수정 ────────────────────────────────────────
    function editComment(commentId, btn) {
        const item    = document.getElementById('comment-' + commentId);
        const textEl  = item.querySelector('.comment-text');
        const current = textEl.textContent;

        const textarea = document.createElement('textarea');
        textarea.value = current;
        textarea.style.cssText = 'width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;resize:none;height:60px;margin-top:4px;font-family:inherit;';
        textEl.replaceWith(textarea);
        textarea.focus();

        btn.textContent = '저장';
        btn.onclick = async () => {
            const newContent = textarea.value.trim();
            if (!newContent) { alert('내용을 입력해주세요.'); return; }

            const form = new URLSearchParams();
            form.append('content', newContent);

            const res = await fetch(`/board/comments/${commentId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [csrfHeader]: csrfToken
                },
                body: form
            });
            const data = await res.json();
            if (data.error) { alert(data.error); return; }

            const newText = document.createElement('div');
            newText.className = 'comment-text';
            newText.textContent = newContent;
            textarea.replaceWith(newText);
            btn.textContent = '수정';
            btn.onclick = () => editComment(commentId, btn);
        };
    }

    // ── 댓글 삭제 ────────────────────────────────────────
    async function deleteComment(commentId) {
        if (!confirm('댓글을 삭제하시겠습니까?')) return;

        const res = await fetch(`/board/comments/${commentId}`, {
            method: 'DELETE',
            headers: { [csrfHeader]: csrfToken }
        });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }

        document.getElementById('comment-' + commentId).remove();
        updateCommentCount(-1);
    }

    // ── DOM 헬퍼 ─────────────────────────────────────────
    function appendComment(data) {
        const list = document.getElementById('comment-list');
        const initial = data.author.charAt(0).toUpperCase();
        const timeStr = data.createdAt.replace('T', ' ').substring(0, 16);
        const isOwn   = data.author === currentUsername;

        const div = document.createElement('div');
        div.id = 'comment-' + data.id;
        div.className = 'comment-item';
        div.innerHTML = `
            <div class="comment-avatar">${initial}</div>
            <div class="comment-body">
                <span class="comment-author">${data.author}</span>
                <span class="comment-time">${timeStr}</span>
                <div class="comment-text">${data.content}</div>
                ${isOwn ? `
                <div class="comment-actions">
                    <button class="btn-cm btn-cm-edit" onclick="editComment(${data.id}, this)">수정</button>
                    <button class="btn-cm btn-cm-delete" onclick="deleteComment(${data.id})">삭제</button>
                </div>` : ''}
            </div>`;
        list.appendChild(div);
    }

    function updateCommentCount(delta) {
        const el = document.getElementById('comment-count');
        el.textContent = parseInt(el.textContent) + delta;
    }
</script>
</body>
</html>
