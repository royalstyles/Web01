<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta charset="UTF-8">
    <title>게시판</title>
    <!--
        게시판 목록 페이지 (board/board-list.html)
        - /board 경로 진입 시 표시되는 전체 게시글 목록 화면
        - 카테고리 필터, 제목 키워드 검색, 10개 단위 페이징 지원
        - 비로그인 사용자도 조회 가능 / 글쓰기 버튼 클릭 시 로그인 페이지로 이동
        - Model 속성: posts, postPage, categories, categoryId, keyword, currentPage, currentBoardName
    -->
    <th:block th:replace="~{fragments/header :: headerStyles}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .navbar {
            background: #4f46e5; color: white;
            padding: 14px 32px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(79,70,229,.3);
        }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .navbar a { color: white; text-decoration: none; font-size: 14px;
            padding: 6px 14px; border-radius: 6px;
            background: rgba(255,255,255,.15); transition: background .2s; }
        .navbar a:hover { background: rgba(255,255,255,.25); }

        .wrapper { max-width: 1000px; margin: 32px auto; padding: 0 20px 60px; }

        /* 알림 */
        .alert { padding: 12px 18px; border-radius: 8px; margin-bottom: 20px;
            font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

        /* 필터 바 */
        .filter-bar {
            background: white; border-radius: 12px;
            padding: 16px 20px; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        .cat-btn {
            padding: 6px 16px; border-radius: 20px; font-size: 13px;
            border: 1px solid #e2e8f0; background: white; cursor: pointer;
            color: #6b7280; transition: all .15s; text-decoration: none;
        }
        .cat-btn:hover, .cat-btn.active {
            background: #4f46e5; color: white; border-color: #4f46e5;
        }
        .search-wrap { display: flex; gap: 8px; margin-left: auto; }
        .search-wrap input {
            padding: 7px 14px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; width: 200px;
        }
        .search-wrap input:focus { outline: none; border-color: #4f46e5; }
        /* 검색 타입 드롭다운 */
        .search-type-select {
            padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 13px; background: white; color: #374151;
            cursor: pointer; flex-shrink: 0;
        }
        .search-type-select:focus { outline: none; border-color: #4f46e5; }
        .btn-search {
            padding: 7px 18px; background: #4f46e5; color: white;
            border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
        }

        /* 테이블 카드 */
        .table-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden;
            margin-bottom: 20px;
        }
        .table-top {
            padding: 16px 20px; border-bottom: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-top h3 { font-size: 15px; font-weight: 600; color: #1e1b4b; }
        .btn-write {
            padding: 8px 20px; background: #4f46e5; color: white;
            border-radius: 8px; text-decoration: none; font-size: 14px;
            font-weight: 500; transition: background .15s;
        }
        .btn-write:hover { background: #4338ca; }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: #f8fafc; padding: 11px 16px;
            text-align: left; font-size: 12px; font-weight: 600;
            color: #6b7280; text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 1px solid #e2e8f0; white-space: nowrap;
        }
        tbody td {
            padding: 14px 16px; font-size: 14px; color: #374151;
            border-bottom: 1px solid #f1f5f9; vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafbff; }

        .post-title a { color: #1e1b4b; text-decoration: none; font-weight: 500; }
        .post-title a:hover { color: #4f46e5; text-decoration: underline; }

        /* 썸네일 */
        .post-title-wrap { display: flex; align-items: center; gap: 10px; }
        .post-thumb {
            width: 48px; height: 48px; border-radius: 6px;
            object-fit: cover; flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }
        .post-thumb-video {
            width: 48px; height: 48px; border-radius: 6px;
            background: #1e1b4b;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .badge-cat {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
            background: #ede9fe; color: #6d28d9; margin-right: 6px;
        }
        .meta { font-size: 12px; color: #9ca3af; margin-top: 3px; }
        td.num { color: #9ca3af; font-size: 13px; text-align: center; white-space: nowrap; }

        /* 읽음/안읽음 표시 */
        .unread-dot {
            display: inline-block;
            width: 7px; height: 7px; border-radius: 50%;
            background: #4f46e5; flex-shrink: 0;
            margin-right: 4px; vertical-align: middle;
        }
        /* 제목 링크 — 안읽음 시 굵게, 읽음 시 일반 */
        tr.is-read .post-title a { font-weight: 400; color: #6b7280; }
        tr.is-read .unread-dot   { display: none; }

        /* 공지 행 */
        .notice-row td { background: #fffbeb; }
        .notice-row:hover td { background: #fef9ec !important; }
        .badge-notice {
            display: inline-flex; align-items: center;
            padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 700;
            background: #f59e0b; color: white;
            margin-right: 6px; flex-shrink: 0;
        }
        .notice-title-link {
            color: #78350f; font-weight: 600;
            text-decoration: none; cursor: pointer;
        }
        .notice-title-link:hover { color: #d97706; text-decoration: underline; }

        /* 공지 모달 */
        .notice-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.45); z-index: 300;
            align-items: center; justify-content: center;
        }
        .notice-modal-overlay.open { display: flex; }
        .notice-modal-box {
            background: white; border-radius: 16px; padding: 32px;
            width: 560px; max-width: 90vw;
            max-height: 80vh; overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0,0,0,.2);
            animation: noticeModalIn .18s ease;
        }
        @keyframes noticeModalIn {
            from { opacity: 0; transform: scale(.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .notice-modal-title {
            font-size: 17px; font-weight: 700; color: #1e1b4b;
            margin-bottom: 8px;
        }
        .notice-modal-meta {
            font-size: 12px; color: #9ca3af; margin-bottom: 18px;
            padding-bottom: 14px; border-bottom: 1px solid #f1f5f9;
        }
        .notice-modal-content {
            font-size: 14px; color: #374151; line-height: 1.7;
            white-space: pre-line; word-break: break-word;
        }
        .notice-modal-close {
            margin-top: 24px; text-align: right;
        }
        .notice-modal-close button {
            padding: 8px 20px; background: #f1f5f9; color: #374151;
            border: none; border-radius: 8px; font-size: 14px;
            cursor: pointer; font-family: inherit;
        }
        .notice-modal-close button:hover { background: #e2e8f0; }

        /* 빈 목록 */
        .empty { text-align: center; padding: 60px 0; color: #9ca3af; font-size: 15px; }

        /* 페이징 */
        .pagination {
            display: flex; justify-content: center; gap: 6px; margin-top: 20px;
        }
        .page-btn {
            padding: 7px 13px; border-radius: 8px; font-size: 14px;
            border: 1px solid #e2e8f0; background: white; color: #374151;
            text-decoration: none; transition: all .15s;
        }
        .page-btn:hover { border-color: #4f46e5; color: #4f46e5; }
        .page-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .page-btn.disabled { color: #d1d5db; pointer-events: none; }

        @media (max-width: 640px) {
            .search-wrap { margin-left: 0; width: 100%; flex-wrap: wrap; }
            .search-type-select { width: 100%; }
            .search-wrap input { flex: 1; }
            th.hide-sm, td.hide-sm { display: none; }
        }
    </style>
</head>
<body>

<!-- 게시판 페이지 -->
<div th:replace="~{fragments/header :: siteHeader(${currentBoardName}, 'home')}"></div>

<div class="wrapper">

    <div th:if="${successMsg}" class="alert alert-success">✅ <span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}"   class="alert alert-error">❌ <span th:text="${errorMsg}"></span></div>

    <!-- 카테고리 필터 + 검색 -->
    <div class="filter-bar">
        <a th:href="@{/board}" th:class="${categoryId == null} ? 'cat-btn active' : 'cat-btn'">전체</a>
        <a th:each="cat : ${categories}"
           th:href="@{/board(categoryId=${cat.id})}"
           th:text="${cat.name}"
           th:class="${categoryId == cat.id} ? 'cat-btn active' : 'cat-btn'"></a>

        <form class="search-wrap" th:action="@{/board}" method="get">
            <input th:if="${categoryId != null}" type="hidden" name="categoryId" th:value="${categoryId}"/>
            <!-- 검색 타입 선택 드롭다운 -->
            <select name="searchType" class="search-type-select">
                <option value="title"        th:selected="${searchType == null or searchType == 'title'}">제목</option>
                <option value="user"         th:selected="${searchType == 'user'}">작성자</option>
                <option value="titleContent" th:selected="${searchType == 'titleContent'}">제목+본문</option>
            </select>
            <input type="text" name="keyword" placeholder="검색어 입력..." th:value="${keyword}">
            <button type="submit" class="btn-search">검색</button>
        </form>
    </div>

    <!-- 공지 상세 모달 (공지가 있을 때만 렌더링) -->
    <th:block th:if="${notices != null and !#lists.isEmpty(notices)}">
        <div id="notice-modal" class="notice-modal-overlay" onclick="closeNoticeModal(event)">
            <div class="notice-modal-box">
                <div class="badge-notice" style="display:inline-flex; margin-bottom:10px;">공지</div>
                <div class="notice-modal-title" id="notice-modal-title"></div>
                <div class="notice-modal-meta" id="notice-modal-meta"></div>
                <div class="notice-modal-content" id="notice-modal-content"></div>
                <div class="notice-modal-close">
                    <button onclick="document.getElementById('notice-modal').classList.remove('open')">닫기</button>
                </div>
            </div>
        </div>
        <script>
            function openNoticeModal(row) {
                document.getElementById('notice-modal-title').textContent   = row.dataset.title   || '';
                document.getElementById('notice-modal-meta').textContent    = row.dataset.date    + ' 작성';
                document.getElementById('notice-modal-content').textContent = row.dataset.content || '';
                document.getElementById('notice-modal').classList.add('open');
            }
            function closeNoticeModal(e) {
                if (e.target === document.getElementById('notice-modal')) {
                    document.getElementById('notice-modal').classList.remove('open');
                }
            }
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') document.getElementById('notice-modal') && document.getElementById('notice-modal').classList.remove('open');
            });
        </script>
    </th:block>

    <!-- 게시글 목록 -->
    <div class="table-card">
        <div class="table-top">
            <h3>
                전체 <span th:text="${postPage.totalElements}">0</span>건
                <th:block th:if="${keyword != null and !#strings.isEmpty(keyword)}">
                    — "<strong th:text="${keyword}"></strong>"
                    <span th:text="${searchType == 'user'} ? '작성자' : (${searchType == 'titleContent'} ? '제목+본문' : '제목')"></span>
                    검색 결과
                </th:block>
            </h3>
            <!-- 비로그인 시 로그인 페이지로 이동 -->
            <a th:href="${isLoggedIn} ? @{/board/write} : @{/auth/login}" class="btn-write">✏️ 글쓰기</a>
        </div>

        <table>
            <thead>
            <tr>
                <th style="min-width:60px; width:60px; white-space:nowrap; text-align:center;" class="hide-sm">번호</th>
                <th>제목</th>
                <th style="min-width:90px; width:90px; white-space:nowrap; text-align:center;" class="hide-sm">작성자</th>
                <th style="min-width:90px; width:90px; white-space:nowrap; text-align:center;" class="hide-sm">작성일</th>
                <th style="min-width:60px; width:60px; white-space:nowrap; text-align:center;">조회</th>
                <th style="min-width:80px; width:80px; white-space:nowrap; text-align:center;">좋아요</th>
            </tr>
            </thead>
            <tbody>
            <!-- ── 공지 행 (테이블 최상단 고정) ── -->
            <tr class="notice-row" th:each="notice : ${notices}"
                th:data-title="${notice.title}"
                th:data-content="${notice.content != null ? notice.content : ''}"
                th:data-date="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}"
                onclick="openNoticeModal(this)"
                style="cursor:pointer;">
                <td class="num hide-sm" style="text-align:center;">
                    <span class="badge-notice">공지</span>
                </td>
                <td class="post-title">
                    <span class="notice-title-link" th:text="${notice.title}"></span>
                </td>
                <td class="num hide-sm" style="text-align:center; color:#b45309;">관리자</td>
                <td class="num hide-sm" style="text-align:center;" th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}"></td>
                <td class="num" style="text-align:center;">—</td>
                <td class="num" style="text-align:center;">—</td>
            </tr>
            <!-- ── 공지와 일반 게시글 사이 구분선 ── -->
            <tr th:if="${notices != null and !#lists.isEmpty(notices)}"
                style="height:2px; background:linear-gradient(to right,#fde68a,#fef3c7,#fde68a); pointer-events:none;">
                <td colspan="6" style="padding:0; border:none;"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(posts)}">
                <td colspan="6" class="empty">📭 게시글이 없습니다.</td>
            </tr>
            <!-- data-post-id: 읽음 상태 JS에서 localStorage 와 대조할 때 사용 -->
            <tr th:each="post : ${posts}" th:data-post-id="${post.id}">
                <td class="num hide-sm" th:text="${post.id}"></td>
                <td class="post-title">
                    <div class="post-title-wrap">
                        <!-- 이미지 썸네일 -->
                        <img th:if="${post.thumbnailUrl != null}"
                             th:src="${post.thumbnailUrl}"
                             class="post-thumb" alt="썸네일"/>
                        <!-- 동영상 아이콘 (이미지 없고 영상 있을 때) -->
                        <div th:if="${post.thumbnailUrl == null and post.videoPresent}"
                             class="post-thumb-video">🎬</div>
                        <div>
                            <span th:if="${post.category != null}"
                                  class="badge-cat" th:text="${post.category.name}"></span>
                            <!-- 안읽음 점 표시 — JS 에서 읽은 게시글이면 숨김 처리 -->
                            <span class="unread-dot"></span>
                            <a th:href="@{/board/{id}(id=${post.id})}" th:text="${post.title}"></a>
                            <div class="meta">
                                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                            </div>
                        </div>
                    </div>
                </td>
                <td class="num hide-sm" th:text="${post.author.username}"></td>
                <td class="num hide-sm" th:text="${#temporals.format(post.createdAt, 'MM/dd')}"></td>
                <td class="num" th:text="${post.viewCount}"></td>
                <td class="num" th:text="${post.likeCount}">❤️</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <div class="pagination" th:if="${postPage.totalPages > 1}">
        <a th:href="@{/board(page=0, categoryId=${categoryId}, keyword=${keyword}, searchType=${searchType})}"
           th:class="${postPage.first} ? 'page-btn disabled' : 'page-btn'">«</a>

        <a th:each="i : ${#numbers.sequence(0, postPage.totalPages - 1)}"
           th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
           th:href="@{/board(page=${i}, categoryId=${categoryId}, keyword=${keyword}, searchType=${searchType})}"
           th:text="${i + 1}"
           th:class="${i == currentPage} ? 'page-btn active' : 'page-btn'"></a>

        <a th:href="@{/board(page=${postPage.totalPages - 1}, categoryId=${categoryId}, keyword=${keyword}, searchType=${searchType})}"
           th:class="${postPage.last} ? 'page-btn disabled' : 'page-btn'">»</a>
    </div>

</div>

<script th:inline="javascript">
    /**
     * 읽음/안읽음 상태 표시
     * - 로그인 사용자: 서버에서 제공한 readPostIds 사용 (기기 간 동기화)
     * - 비로그인 사용자: localStorage 의 'readPosts' 배열 사용
     */
    (function () {
        const isLoggedIn   = /*[[${isLoggedIn}]]*/ false;
        const serverReadIds = new Set(/*[[${readPostIds}]]*/ []);
        const localReadIds  = new Set(JSON.parse(localStorage.getItem('readPosts') || '[]'));

        // 로그인 시 서버 데이터, 비로그인 시 localStorage
        const readPosts = isLoggedIn ? serverReadIds : localReadIds;
        if (readPosts.size === 0) return;

        document.querySelectorAll('tr[data-post-id]').forEach(tr => {
            if (readPosts.has(parseInt(tr.dataset.postId))) {
                tr.classList.add('is-read');
            }
        });
    })();
</script>
</body>
</html>
