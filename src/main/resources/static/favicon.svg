<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- 배경: 하늘빛 → 딥 인디고 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <!-- 클라우드 채우기 -->
    <linearGradient id="cloudFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.85"/>
    </linearGradient>
    <!-- 중앙 글로우 -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 중앙 글로우 -->
  <circle cx="32" cy="36" r="20" fill="url(#glow)"/>

  <!-- 뉴럴 연결선 (클라우드 아래쪽) -->
  <line x1="14" y1="50" x2="32" y2="38" stroke="rgba(165,180,252,0.6)" stroke-width="1"/>
  <line x1="32" y1="56" x2="32" y2="38" stroke="rgba(165,180,252,0.6)" stroke-width="1"/>
  <line x1="50" y1="50" x2="32" y2="38" stroke="rgba(165,180,252,0.6)" stroke-width="1"/>
  <!-- 측면 연결선 -->
  <line x1="8"  y1="36" x2="32" y2="38" stroke="rgba(165,180,252,0.4)" stroke-width="0.9"/>
  <line x1="56" y1="36" x2="32" y2="38" stroke="rgba(165,180,252,0.4)" stroke-width="0.9"/>
  <!-- 외곽 노드 간 연결 -->
  <line x1="14" y1="50" x2="32" y2="56" stroke="rgba(165,180,252,0.25)" stroke-width="0.7"/>
  <line x1="50" y1="50" x2="32" y2="56" stroke="rgba(165,180,252,0.25)" stroke-width="0.7"/>
  <line x1="8"  y1="36" x2="14" y2="50" stroke="rgba(165,180,252,0.25)" stroke-width="0.7"/>
  <line x1="56" y1="36" x2="50" y2="50" stroke="rgba(165,180,252,0.25)" stroke-width="0.7"/>

  <!-- 외곽 노드 -->
  <circle cx="8"  cy="36" r="2.5" fill="#a5b4fc"/>
  <circle cx="56" cy="36" r="2.5" fill="#a5b4fc"/>
  <circle cx="14" cy="50" r="2.5" fill="#a5b4fc"/>
  <circle cx="50" cy="50" r="2.5" fill="#a5b4fc"/>
  <circle cx="32" cy="56" r="2.5" fill="#c7d2fe"/>

  <!-- 중앙 노드 글로우 -->
  <circle cx="32" cy="38" r="6" fill="#6366f1" filter="url(#softblur)"/>
  <circle cx="32" cy="38" r="4" fill="white"/>
  <circle cx="32" cy="38" r="2.2" fill="#818cf8"/>

  <!-- ☁️ 클라우드 (상단) -->
  <!-- 클라우드 그림자/깊이 -->
  <g transform="translate(0,1.5)" opacity="0.2">
    <circle cx="22" cy="26" r="8"  fill="#4f46e5"/>
    <circle cx="32" cy="22" r="10" fill="#4f46e5"/>
    <circle cx="42" cy="26" r="8"  fill="#4f46e5"/>
    <rect x="14" y="26" width="36" height="10" rx="1" fill="#4f46e5"/>
  </g>
  <!-- 클라우드 본체 -->
  <circle cx="22" cy="26" r="8"  fill="url(#cloudFill)"/>
  <circle cx="32" cy="22" r="10" fill="url(#cloudFill)"/>
  <circle cx="42" cy="26" r="8"  fill="url(#cloudFill)"/>
  <rect x="14" y="26" width="36" height="9" fill="url(#cloudFill)"/>
</svg>
